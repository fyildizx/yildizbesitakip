<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yıldız Çiftlik Yönetim Sistemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-ekrani" class="auth-container">
    <div class="auth-card">
        <h3>Yıldız Çiftlik Giriş</h3>
        <input type="email" id="auth-email" placeholder="E-posta Adresiniz">
        <input type="password" id="auth-sifre" placeholder="Şifreniz">
        
        <button id="btn-giris" onclick="girisYap()" class="btn-ekle" style="width:100%;">Giriş Yap</button>
        
        <button id="btn-kayit" onclick="kayitOl()" class="btn-yedek" style="width:100%; margin-top:10px;">Kayıt Ol</button>
        
        <button id="btn-google" onclick="googleIleGiris()" class="btn-ekle" style="background:#4285F4; margin-top:10px; width:100%;">
            🔵 Google ile Giriş Yap
        </button>
        
        <p id="auth-hata" style="color:red; font-size:12px; margin-top:10px; font-weight:bold;"></p>
    </div>
</div>

<div id="ana-uygulama" style="display:none;">
    <div class="container">
        <h2>Yıldız Çiftlik Yönetim Sistemi</h2>
        
        <button onclick="cikisYap()" class="btn-sil" style="margin-bottom:15px; width:100%;">❌ GÜVENLİ ÇIKIŞ YAP</button>

        <div class="isletme-bar">
            <div>
                <span style="font-size: 12px; color: #bdc3c7; font-weight: bold;">Çalışılan Aktif İşletme:</span>
                <select id="isletmeSecici" class="isletme-secici" onchange="isletmeDegistir(this.value)"></select>
            </div>
            <div class="isletme-butonlar">
                <button class="btn-yeni-isletme" onclick="yeniIsletmeEkle()">+ YENİ İŞLETME</button>
                <button class="btn-favori-isletme" onclick="favoriIsletmeKaydet()">⭐ FAVORİ YAP</button>
                <button class="btn-isletme-sil" onclick="isletmeSil()">SİL</button>
            </div>
        </div>

        <div class="yedek-bar">
            <button class="btn-yedek" onclick="yedekAl()">⬇ JSON YEDEK AL</button>
            <button class="btn-yedek-yukle" onclick="document.getElementById('yedekDosyaInput').click()">⬆ YEDEĞİ GERİ YÜKLE</button>
            <input type="file" id="yedekDosyaInput" accept=".json" style="display:none;" onchange="yedekYukle(event)">
        </div>

        <div class="ana-modul-secici">
            <button class="modul-btn aktif-modul" id="btn-besiModulu" onclick="modulDegistir('besiModulu', this)">🥩 BESİ YÖNETİMİ</button>
            <button class="modul-btn" id="btn-damizlikModulu" onclick="modulDegistir('damizlikModulu', this)">🥛 DAMIZLIK YÖNETİMİ</button>
        </div>

        <div id="besiModulu" class="modul-icerik aktif-modul-icerik">
            <div class="sekme-menu">
                <button class="sekme-btn aktif" onclick="sekmeDegistir('rasyonSekmesi', this)">📋 Rasyon & Yem</button>
                <button class="sekme-btn" onclick="sekmeDegistir('finansSekmesi', this)">💰 Finans & Maliyet</button>
                <button class="sekme-btn" onclick="sekmeDegistir('stokSekmesi', this)">📦 Stok Takibi</button>
                <button class="sekme-btn" onclick="sekmeDegistir('saglikSekmesi', this)">💉 Sağlık & Aşı</button>
            </div>

            <div id="rasyonSekmesi" class="sekme-icerik aktif-sekme">
                <h3>Birim Fiyatlar ve Değerler</h3>
                <div class="fiyat-grid">
                    <div class="form-group"><label>Arpa (kg/TL)</label><input type="number" id="fiyatArpa" step="0.1"></div>
                    <div class="form-group"><label>Arpa Torba (kg)</label><input type="number" id="arpaTorbaKg" placeholder="Örn: 43"></div>
                    <div class="form-group"><label>Mısır Flake (40kg)</label><input type="number" id="fiyatMisir" step="0.1"></div>
                    <div class="form-group"><label>Yem (50kg)</label><input type="number" id="fiyatYem" step="0.1"></div>
                    <div class="form-group"><label>Soya Küspesi (kg/TL)</label><input type="number" id="fiyatSoya" step="0.1"></div>
                    <div class="form-group"><label>Saman (kg/TL)</label><input type="number" id="fiyatSaman" step="0.1"></div>
                </div>

                <div id="patoklar">
                    <div class="patok-card" id="patok_1">
                        <h3>Patok 1 - Rasyon Bilgileri</h3>
                        <div class="dortlu-grup">
                            <div class="form-group"><label>Hayvan Sayısı</label><input type="number" id="p1_sayi"></div>
                            <div class="form-group"><label>Canlı Kg</label><input type="number" id="p1_kg" placeholder="Örn: 350"></div>
                            <div class="form-group"><label>Hedef Kg</label><input type="number" id="p1_hedef" placeholder="Örn: 600"></div>
                            <div class="form-group"><label>Günlük Tahmini Artış</label><input type="number" id="p1_artis" placeholder="Örn: 1.35" step="0.01"></div>
                        </div>
                        <div class="ikili-grup">
                            <div class="form-group"><label>Yem Proteini (%)</label><input type="number" id="p1_yemProtein" placeholder="Örn: 14" step="0.1"></div>
                            <div class="form-group"><label>Yem Enerjisi (ME)</label><input type="number" id="p1_yemEnerji" placeholder="Örn: 2.6" step="0.1"></div>
                        </div>
                        <div class="grid-5">
                            <div><label class="kucuk-label">Arpa (Top. kg)</label><input type="number" id="p1_arpa" step="0.1"></div>
                            <div><label class="kucuk-label">Mısır (Top. kg)</label><input type="number" id="p1_misir" step="0.1"></div>
                            <div><label class="kucuk-label">Yem (Top. kg)</label><input type="number" id="p1_yem" step="0.1"></div>
                            <div><label class="kucuk-label">Soya (Top. kg)</label><input type="number" id="p1_soya" step="0.1"></div>
                            <div><label class="kucuk-label">Saman (Top. kg)</label><input type="number" id="p1_saman" step="0.1"></div>
                        </div>
                        <div id="sonuc_p1" class="patok-ic-sonuc" style="display:none;"></div>
                    </div>
                </div>

                <div class="buton-grubu">
                    <button class="btn-ekle" onclick="patokEkle()">+ YENİ PATOK EKLE</button>
                    <button class="btn-sil" onclick="patokSil()">- İSTEDİĞİN PATOKU SİL</button>
                </div>
                
                <div class="result-box" id="genelSonucAlani" style="display:none;"></div>
            </div>

            </div>
    </div>
</div>
